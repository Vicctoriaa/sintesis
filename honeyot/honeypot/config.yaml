# Honeypot SOC honeycos — config.yaml
# VM203 · VLAN 50 · 192.168.1.111/27

honeypot:
  hostname: honeypot-soc
  environment: honeypot
  vlan: "50"
  ip: "192.168.1.111"

services:
  ssh:
    enabled: true
    port: 22
    banner: "SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6"
    # Credenciales señuelo que acepta la shell falsa
    credentials:
      - username: root
        password: root
      - username: root
        password: toor
      - username: root
        password: password
      - username: admin
        password: admin
      - username: admin
        password: admin123
      - username: ubuntu
        password: ubuntu
      - username: user
        password: password123

  ftp:
    enabled: true
    port: 21
    banner: "220 ProFTPD 1.3.8 Server (Debian) [192.168.1.111]"
    anonymous_allowed: true
    credentials:
      - username: anonymous
        password: ""
      - username: ftpuser
        password: ftpuser
      - username: backup
        password: backup123

  http:
    enabled: true
    port: 80

  https:
    enabled: true
    port: 443
    cert_file: "/opt/honeypot/ssl/cert.pem"
    key_file: "/opt/honeypot/ssl/key.pem"

  rdp:
    enabled: true
    port: 3389

  smb:
    enabled: true
    port: 445

logging:
  path: "/var/log/honeypot/honeypot.log"
  max_bytes: 10485760   # 10 MB
  backup_count: 5

alerts:
  brute_force:
    threshold: 5
    window_seconds: 60
    whitelist:
      - "192.168.3.200"   # honeycos
      - "10.1.1.34"       # CT103 playbooks-dns
      - "127.0.0.1"

  port_scan:
    min_services: 3        # servicios distintos para disparar alerta
    window_seconds: 30     # ventana deslizante

  credential_stuffing:
    min_users: 5           # usuarios distintos con la misma contrasena
    window_seconds: 60     # ventana deslizante
